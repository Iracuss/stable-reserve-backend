spring.application.name=stable-manager

# Give your database a name
spring.datasource.url=jdbc:h2:mem:stable_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# This allows us to see the database in a browser later
spring.h2.console.enabled=true

# This tells Hibernate (the JPA engine) to automatically create tables based on our Java code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jackson.serialization.fail-on-empty-beans=false

# Frontend URL for CORS configuration. 
# In production, you can override this with an environment variable: FRONTEND_URL=https://my-app.com
frontend.url=http://localhost:5173
